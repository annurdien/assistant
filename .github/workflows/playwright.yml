name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Browser Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: assistant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://admin:testpassword@localhost:5432/assistant_test
      JWT_SECRET: ci-jwt-secret-not-for-production
      ADMIN_USER: admin
      ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'adminpassword' }}
      GEMINI_API_KEY: dummy-key-for-ui-tests
      INTERNAL_API_TOKEN: ci-internal-token
      CORS_ORIGIN: http://localhost:5173
      API_EXECUTE_URL: http://localhost:3000/execute
      VITE_API_URL: http://localhost:3000

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup pnpm ────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── 3. Setup Node ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # ── 4. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install

      # ── 5. Install Playwright browsers ──────────────────────────────────────
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      # ── 6. Generate Prisma client ────────────────────────────────────────────
      - name: Generate Prisma client
        run: pnpm --filter @assistant/database run db:generate

      # ── 7. Build all packages ────────────────────────────────────────────────
      - name: Build
        run: pnpm build

      # ── 8. Run DB migrations + seed ─────────────────────────────────────────
      - name: Push DB schema and seed
        run: |
          pnpm --filter @assistant/database run db:push
          pnpm --filter @assistant/database run db:seed
          npx tsx apps/api-server/src/seed-all.ts

      # ── 9. Start API + WhatsApp service in background ───────────────────────
      - name: Start API server
        run: pnpm start:prod:api &
        shell: bash

      - name: Start WhatsApp service
        run: pnpm start:prod:wa &
        shell: bash

      # ── 10. Start Dashboard dev server ───────────────────────────────────────
      - name: Start Dashboard
        run: pnpm start:prod:dash &
        shell: bash

      # ── 11. Wait for services ────────────────────────────────────────────────
      - name: Wait for services to be ready
        run: |
          npx wait-on http://localhost:3000/health http://localhost:5173 --timeout 60000

      # ── 12. Run Playwright tests ─────────────────────────────────────────────
      - name: Run Playwright tests
        run: pnpm test:ui

      # ── 13. Upload test report on failure ────────────────────────────────────
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
