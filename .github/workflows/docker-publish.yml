name: Publish Docker Image to GHCR

on:
  push:
    branches:
      - main        # push latest on every main commit
    tags:
      - "v*.*.*"   # push versioned tag on releases  (e.g. v1.2.3)
  workflow_dispatch: # allow manual trigger from the Actions UI

env:
  REGISTRY: ghcr.io
  # Image name = ghcr.io/<owner>/<repo>  (all lowercase, auto-resolved)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    # Required permissions for GHCR push + attestation
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up QEMU (cross-compilation for arm64) ─────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx ──────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to GHCR ───────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Extract Docker metadata (tags + labels) ───────────────────────────
      #   On main       → ghcr.io/<owner>/<repo>:latest
      #   On v1.2.3 tag → ghcr.io/<owner>/<repo>:1.2.3
      #                   ghcr.io/<owner>/<repo>:1.2
      #                   ghcr.io/<owner>/<repo>:1
      #                   ghcr.io/<owner>/<repo>:latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=WhatsApp Assistant
            org.opencontainers.image.description=Self-hosted AI WhatsApp assistant (API + WhatsApp service + Dashboard)
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      # ── 6. Build and push ────────────────────────────────────────────────────
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — keeps layers between runs for faster rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Attest the image (supply-chain security) ──────────────────────────
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
